name: CI

on:
  push:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted (run 'make fmt'):"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: go build -o pgdx .

  docker:
    name: Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Buildx
        # The default "docker" driver can't export to the GHA cache; the
        # docker-container driver Buildx sets up here can.
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        # Single-arch amd64 build loaded into the local daemon so Trivy can scan
        # it. Runs on every branch (not just main). Shares the GHA layer cache
        # with the multi-arch push below, so nothing is built twice.
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: pgdx:scan
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        # Fail on fixable CRITICAL/HIGH vulnerabilities; unfixed ones are reported
        # but don't break the build (ignore-unfixed).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pgdx:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library
        env:
          # Authenticate the vuln-DB pull from GHCR to avoid anonymous rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        # Only authenticate when we intend to push (main branch or version tags).
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        # Only needed for the push below, which runs on main / version tags.
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/capitaltg/pgdx
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        # Multi-arch build + push only on main / version tags. Other branches stop
        # after the amd64 scan build above, which already validates the Dockerfile.
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
